name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Ganti jadi 'master' jika branch utamamu namanya master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Push to HF
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # 1. Hapus folder .git bawaan untuk menghapus seluruh riwayat commit masa lalu
        rm -rf .git
          
        # 2. Hapus folder frontend total agar tidak tersisa file biner (.png)
        rm -rf frontend
          
        # 3. Inisialisasi ulang Git dari nol (fresh repository)
        git init
        git branch -m main
          
        # 4. Atur ulang konfigurasi user Git
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
          
        # 5. Masukkan semua file backend yang tersisa ke dalam commit baru yang bersih
        git add .
        git commit -m "deploy: fresh backend release without frontend history"
          
        # 6. Force push satu-satunya commit bersih ini ke Hugging Face
        git remote add hf https://Ooyaann:$HF_TOKEN@huggingface.co/spaces/Ooyaann/webcraft-db-hf
        git push --force hf main